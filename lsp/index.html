<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浏览器主页</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">
                <i class="fas fa-rocket"></i>
                航天浏览器主页
            </h1>
            <p class="subtitle">简洁高效的浏览器起始页</p>
        </header>

        <main class="main-content">
            <div class="search-section">
                <form id="searchForm" class="search-form">
                    <div class="search-input-container">
                        <i class="fas fa-search search-icon"></i>
                        <input 
                            type="text" 
                            id="searchInput" 
                            class="search-input" 
                            placeholder="使用必应搜索..." 
                            autocomplete="off"
                            autofocus
                        >
<div class="search-engine-selector">
                            <button type="button" class="engine-selector-btn" id="engineSelectorBtn">
                                <i class="fab fa-microsoft current-engine-icon"></i>
                                <span class="current-engine-name">必应</span>
                                <i class="fas fa-chevron-down dropdown-icon"></i>
                            </button>
                            <div class="engine-dropdown" id="engineDropdown">
                                <div class="engine-option active" data-engine="bing">
                                    <i class="fab fa-microsoft"></i>
                                    <span>必应</span>
                                </div>
                                <div class="engine-option" data-engine="google">
                                    <i class="fab fa-google"></i>
                                    <span>谷歌</span>
                                </div>
                                <div class="engine-option" data-engine="baidu">
                                    <i class="fab fa-baidu"></i>
                                    <span>百度</span>
                                </div>
                                <div class="engine-option" data-engine="duckduckgo">
                                    <i class="fas fa-search"></i>
                                    <span>DuckDuckGo</span>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="search-button">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>
                </form>
            </div>

            <div class="tools-section">
                <h2 class="section-title">
                    <i class="fas fa-tools"></i>
                    工具区
                </h2>
                
                <div class="tools-grid">
                    <!-- 工具1: 卫星百科搜索 -->
                    <div class="tool-card" id="satelliteWikiCard">
                        <div class="tool-icon">
                            <i class="fas fa-satellite"></i>
                        </div>
                        <h3 class="tool-title">卫星百科</h3>
                        <p class="tool-description">卫星知识与资料</p>
                    </div>

                    <!-- 工具2: UNN News -->
                    <div class="tool-card" id="unnNewsCard">
                        <div class="tool-icon">
                            <i class="fas fa-newspaper"></i>
                        </div>
                        <h3 class="tool-title">UNN News</h3>
                        <p class="tool-description">UNN新闻网站</p>
                    </div>

                    <!-- 工具3: 积满 -->
                    <div class="tool-card" id="jimanCard">
                        <div class="tool-icon">
                            <i class="fas fa-gamepad"></i>
                        </div>
                        <h3 class="tool-title">积满</h3>
                        <p class="tool-description">游戏娱乐网站</p>
                    </div>

                    <!-- 工具4: 爱 -->
                    <div class="tool-card" id="aiCard">
                        <div class="tool-icon">
                            <i class="fas fa-heart"></i>
                        </div>
                        <h3 class="tool-title">爱</h3>
                        <p class="tool-description">爱心分享网站</p>
                    </div>

                </div>
            </div>
        </main>

        <footer class="footer">
            <p class="footer-text">
                设计灵感源于对航天科技的热爱 | 
                <span id="currentDate"></span>
            </p>
        </footer>
    </div>

    <!-- 卫星百科搜索模态框 -->
    <div id="satelliteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>
                    <i class="fas fa-satellite"></i>
                    卫星百科搜索
                </h3>
                <button class="close-modal" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p class="modal-description">
                    输入您想要搜索的卫星知识或相关资料
                </p>
                <form id="satelliteSearchForm">
                    <div class="modal-input-container">
                        <input 
                            type="text" 
                            id="satelliteSearchInput" 
                            class="modal-input" 
                            placeholder="例如：GPS卫星、遥感卫星..."
                            autocomplete="off"
                        >
                        <button type="submit" class="modal-search-button">
                            <i class="fas fa-search"></i>
                            搜索卫星百科
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
