<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>友情链接</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 20px 0;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-item {
            background-color: #fff;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .link-item a {
            font-size: 1.2em;
            color: #333;
            text-decoration: none;
        }

        .link-item a:hover {
            text-decoration: underline;
        }

        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }

        /* 响应式设计 */
        @media (max-width: 600px) {
            .link-item a {
                font-size: 1em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>友情链接</h1>
        <p>欢迎来到我们的友情链接页面！</p>
    </header>

    <main>
        <section class="link-list">
            <div class="link-item">
                <a href="https://www.example.com" target="_blank" rel="noopener noreferrer">Example 网站</a>
                <p></p>
            </div>
            <div class="link-item">
                <a href="https://www.anotherexample.com" target="_blank" rel="noopener noreferrer">Another Example 网站</a>
                <p></p>
            </div>
            <div class="link-item">
                <a href="https://www.samplewebsite.com" target="_blank" rel="noopener noreferrer">Sample Website</a>
                <p></p>
            </div>
            <!-- 你可以在这里继续添加更多的友情链接 -->
        </section>
    </main>

    <footer>
        <p>&copy; 2025 NAS油条. 版权所有.</p>
    </footer>
</body>
</html>
